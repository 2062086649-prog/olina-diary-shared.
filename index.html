<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Olina Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{--blue:#0b63a3;--soft:#e6f7ff}
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: "Pacifico", cursive;
    background: linear-gradient(to bottom, #eaf8ff, #dff4ff);
    color: #033a5a;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px;
  }
  .card{
    width:100%;
    max-width:760px;
    background: rgba(255,255,255,0.92);
    border-radius:14px;
    box-shadow:0 10px 30px rgba(8,40,60,0.12);
    padding:22px;
  }
  h1{ text-align:center; margin:0 0 14px; font-size:40px; color:var(--blue) }
  .row{display:flex; gap:12px; align-items:center}
  .col{display:flex; flex-direction:column; gap:10px}
  input[type="text"], input[type="password"], textarea{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid rgba(11,99,163,0.12);
    font-family: "Pacifico", cursive;
    font-size:16px;
    resize:vertical;
  }
  textarea{ min-height:120px; }
  button{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    background:var(--blue);
    color:#fff;
    cursor:pointer;
    font-size:16px;
  }
  button.secondary{ background:#8fc9ff; color:#07394f }
  .entries{ margin-top:18px; display:flex; flex-direction:column; gap:12px }
  .entry{
    padding:12px;
    border-radius:10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(245,251,255,0.85));
    border:1px solid rgba(11,99,163,0.06);
  }
  .meta{ font-size:12px; color:#2b6b91; margin-bottom:6px }
  .entry-title{ font-weight:700; font-size:18px; color: #014a72; margin:0 0 6px }
  .entry-content{ margin:0; white-space:pre-wrap; line-height:1.4; color:#083a55 }
  .controls{ margin-top:8px; display:flex; gap:8px }
  .small{ font-size:13px; color:#2b6b91 }
  /* snow */
  #snow { position:fixed; inset:0; pointer-events:none; z-index: 1000; }
  .flake { position:absolute; color:#fff; user-select:none; font-size:16px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.08)); opacity:0.95; animation: fall linear infinite; }
  @keyframes fall { from{transform: translateY(-10vh);} to{transform: translateY(110vh);} }
  /* hide edit UI on small screens a bit */
  @media (max-width:520px){ .row{flex-direction:column} button{width:100%} }
</style>
</head>
<body>
  <div id="snow"></div>

  <div class="card" role="main">
    <h1>Olina Diary</h1>

    <!-- VIEW login -->
    <div id="viewBox">
      <div class="col">
        <input id="viewPassword" type="password" placeholder="Enter password to view (Olina123)" />
        <div class="row">
          <button id="viewBtn">Enter</button>
          <div class="small">Enter <strong>Olina123</strong> to view the diary</div>
        </div>
      </div>
    </div>

    <!-- DIARY UI -->
    <div id="diaryBox" style="display:none;">
      <div class="col">
        <input id="titleInput" type="text" placeholder="Title" />
        <textarea id="contentInput" placeholder="Write your diary here..."></textarea>

        <div class="row" style="align-items:center;">
          <input id="writePassword" type="password" placeholder="Enter write password (Olina890)"/>
          <button id="addBtn">Add Entry</button>
        </div>
        <div class="small">To add / edit / delete entries you must know <strong>Olina890</strong>.</div>
      </div>

      <div id="entries" class="entries" aria-live="polite" style="margin-top:18px;"></div>
    </div>
  </div>

<script>
/* ---------- Snow effect ---------- */
const snowRoot = document.getElementById('snow');
function spawnFlake(){
  const f = document.createElement('div');
  f.className='flake';
  const size = Math.random()*16 + 10;
  f.style.fontSize = size+'px';
  f.style.left = Math.random()*100 + 'vw';
  f.style.opacity = 0.7 + Math.random()*0.3;
  f.style.animationDuration = (6 + Math.random()*8) + 's';
  f.textContent = '❄';
  snowRoot.appendChild(f);
  setTimeout(()=> f.remove(), 16000);
}
setInterval(spawnFlake, 180);
for(let i=0;i<18;i++) spawnFlake();

/* ---------- App logic ---------- */
const API = '/api/addEntry'; // calls serverless function
const VIEW_PW = 'Olina123';
const WRITE_PW = 'Olina890';

const viewBox = document.getElementById('viewBox');
const diaryBox = document.getElementById('diaryBox');
const viewBtn = document.getElementById('viewBtn');
const addBtn = document.getElementById('addBtn');

let writerAuthenticated = false; // becomes true if user enters write password

viewBtn.addEventListener('click', () => {
  const val = document.getElementById('viewPassword').value.trim();
  if(val === VIEW_PW){
    viewBox.style.display = 'none';
    diaryBox.style.display = 'block';
    loadEntries();
  } else {
    alert('Wrong view password');
  }
});

async function loadEntries(){
  try{
    const res = await fetch(API);
    if(!res.ok) throw new Error('Failed to load');
    const data = await res.json(); // expected array of entries
    renderEntries(data || []);
  } catch(e){
    console.error(e);
    alert('Could not load diary entries.');
  }
}

function renderEntries(entries){
  const root = document.getElementById('entries');
  root.innerHTML = '';
  // show newest first
  entries.slice().reverse().forEach((entry, idx)=>{
    const i = entries.length - 1 - idx; // compute original index
    const el = document.createElement('div');
    el.className = 'entry';
    const time = entry.time || '';
    el.innerHTML = `
      <div class="meta"><span class="entry-date">${entry.date} ${time}</span></div>
      <div class="entry-title">${escapeHtml(entry.title || '')}</div>
      <div class="entry-content">${escapeHtml(entry.content || '')}</div>
    `;
    // controls (edit/delete) - only show if writerAuthenticated true
    const ctr = document.createElement('div');
    ctr.className = 'controls';
    if(writerAuthenticated){
      const editBtn = document.createElement('button');
      editBtn.className = 'secondary';
      editBtn.textContent = 'Edit';
      editBtn.onclick = ()=> editEntry(i);
      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete';
      delBtn.onclick = ()=> deleteEntry(i);
      ctr.appendChild(editBtn);
      ctr.appendChild(delBtn);
      el.appendChild(ctr);
    }
    root.appendChild(el);
  });
}

/* helper escape */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});
}

/* Add entry */
addBtn.addEventListener('click', async () => {
  const title = document.getElementById('titleInput').value.trim();
  const content = document.getElementById('contentInput').value.trim();
  const pw = document.getElementById('writePassword').value.trim();

  if(!title || !content || !pw){ alert('Please fill title, content and write password'); return; }

  // authenticate write password locally first
  if(pw !== WRITE_PW){
    alert('Wrong write password');
    return;
  }

  // set writerAuthenticated so controls appear after load
  writerAuthenticated = true;

  try{
    const now = new Date();
    const date = now.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
    const time = now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, title, content, date, time })
    });
    const json = await res.json();
    if(res.ok){
      document.getElementById('titleInput').value = '';
      document.getElementById('contentInput').value = '';
      loadEntries();
    } else {
      alert(json.message || 'Failed to add');
    }
  } catch(err){
    console.error(err);
    alert('Network or server error');
  }
});

/* Edit entry: prompt user for new values, send PUT */
async function editEntry(index){
  const newTitle = prompt('Edit title:');
  if(newTitle === null) return;
  const newContent = prompt('Edit content:', '');
  if(newContent === null) return;
  const pw = prompt('Enter write password to confirm:');
  if(pw !== WRITE_PW){ alert('Wrong password'); return; }
  try{
    const res = await fetch(API, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, index, title: newTitle, content: newContent })
    });
    const json = await res.json();
    if(res.ok) loadEntries(); else alert(json.message || 'Failed to edit');
  } catch(e){ console.error(e); alert('Network error'); }
}

/* Delete entry */
async function deleteEntry(index){
  const ok = confirm('Delete this entry permanently?');
  if(!ok) return;
  const pw = prompt('Enter write password to confirm delete:');
  if(pw !== WRITE_PW){ alert('Wrong password'); return; }
  try{
    const res = await fetch(API, {
      method:'DELETE',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, index })
    });
    const json = await res.json();
    if(res.ok) loadEntries(); else alert(json.message || 'Failed to delete');
  } catch(e){ console.error(e); alert('Network error'); }
}
</script>
</body>
</html>
