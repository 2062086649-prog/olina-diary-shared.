<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olina — Private Diary</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Raleway:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#cce7ff;
  --card:#e6f2ff;
  --text:#0a1f44;
  --accent:#4da6ff;
  --soft:#6699cc;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Raleway',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:50px 20px;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

.container{max-width:800px; margin:auto; position:relative; z-index:2;}

header{text-align:center; margin-bottom:50px;}
h1{font-family:'Parisienne', cursive; font-size:48px; color:var(--accent);}
.subtitle{color:var(--soft); margin-top:5px;}
.entry{
  background:var(--card); padding:25px; border-radius:15px; margin-bottom:25px;
  box-shadow:0 0 15px rgba(77,166,255,0.3); transition:0.3s ease; position:relative; z-index:2;
}
.entry:hover{transform:translateY(-4px);}
.date{font-size:12px; color:var(--accent); margin-bottom:10px;}
.entry h2{font-family:'Parisienne', cursive; font-size:26px; margin-bottom:12px;}
.entry p{white-space: pre-wrap;}

#loginDiv{text-align:center; margin-top:150px;}
#loginDiv input{padding:10px; margin-right:5px; border-radius:5px; border:none; outline:none;}
#loginDiv button{padding:10px 15px; border:none; border-radius:5px; background:var(--accent); color:var(--bg); cursor:pointer;}

#newEntry{margin-bottom:40px;}
#newEntry input,#newEntry textarea{width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none; outline:none; background:#d9ecff; color:var(--text);}
#newEntry button{padding:10px 15px; border:none; border-radius:5px; background:var(--accent); color:var(--bg); cursor:pointer;}

footer{text-align:center; margin-top:50px; font-size:12px; color:var(--soft); position:relative; z-index:2;}

/* 🔥 动态火焰动画背景 */
.fire {
  position:fixed;
  top:0; left:50%;
  width:300px;
  height:300px;
  margin-left:-150px;
  background: radial-gradient(circle, rgba(77,166,255,0.3) 0%, transparent 60%);
  border-radius:50%;
  animation: flame 5s infinite alternate ease-in-out;
  z-index:1;
  pointer-events:none;
}
@keyframes flame{
  0%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-50px) scale(1.1);}
  100%{transform:translateY(-100px) scale(1.2);}
}

.fire:nth-child(2){
  left:30%;
  animation-delay:1s;
}
.fire:nth-child(3){
  left:70%;
  animation-delay:2s;
}
</style>
</head>

<body>

<!-- 🔥 火焰元素 -->
<div class="fire"></div>
<div class="fire"></div>
<div class="fire"></div>

<div class="container" id="site" style="display:none;">
<header>
<h1>Olina</h1>
<div class="subtitle">Private thoughts / warm reflections</div>
</header>

<div id="newEntry">
<input type="text" id="titleInput" placeholder="Title">
<textarea id="contentInput" rows="5" placeholder="Write your thought here..."></textarea>
<button onclick="addEntry()">Add Entry</button>
</div>

<div id="blog"></div>
<footer>© 2026 Olina — Private</footer>
</div>

<div id="loginDiv">
<h2>Enter Password to Access Diary</h2>
<input type="password" id="password" placeholder="Password">
<button onclick="checkPassword()">Enter</button>
</div>

<script>
let entries = [];

async function fetchEntries(){
  const res = await fetch('/diary.json');
  entries = await res.json();
  renderBlog();
}

function renderBlog(){
  const blog = document.getElementById('blog');
  blog.innerHTML='';
  entries.slice().reverse().forEach(entry=>{
    const div = document.createElement('div');
    div.className='entry';
    div.innerHTML=`<div class="date">${entry.date}</div><h2>${entry.title}</h2><p>${entry.content}</p >`;
    blog.appendChild(div);
  });
}

function checkPassword(){
  const input = document.getElementById('password').value;
  if(input==="Olina123"){
    document.getElementById('loginDiv').style.display='none';
    document.getElementById('site').style.display='block';
    fetchEntries();
  } else {
    alert("Wrong password");
  }
}

async function addEntry(){
  const title = document.getElementById('titleInput').value;
  const content = document.getElementById('contentInput').value;
  if(title && content){
    const res = await fetch('/api/addEntry', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password:"Olina123", title, content})
    });
    if(res.ok){
      document.getElementById('titleInput').value='';
      document.getElementById('contentInput').value='';
      fetchEntries();
    } else { alert('Failed to add entry'); }
  } else { alert('Please fill both title and content'); }
}
</script>

</body>
</html>
