<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pressure is a privilege.</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#e0f7ff;
  --night1:#0b1a2b;
  --night2:#1a2d44;
  --panelBg: rgba(15,30,50,0.85);
  --inputBg: rgba(20,40,70,0.95);
  --btnBg: linear-gradient(90deg,#1a3a6e,#27497f);
  --btnHover: rgba(60,120,200,0.3);
  --entryBg: rgba(25,50,80,0.9);
  --entryMeta: #a0c4ff;
}

html,body{height:100%;margin:0;}
body{
  font-family: 'Great Vibes', cursive;
  background: linear-gradient(to bottom, var(--night1), var(--night2));
  color: var(--primary);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
  overflow:hidden;
}

h1{margin:18px 0 6px 0;font-size:46px;text-align:center}

.panel{
  width:100%;
  max-width:720px;
  background: var(--panelBg);
  border-radius:14px;
  padding:18px 20px;
  box-shadow:0 6px 22px rgba(0,0,0,0.3);
  margin-bottom:18px;
}

input,textarea{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #27497f;
  font-size:16px;
  background: var(--inputBg);
  color: var(--primary);
  box-sizing:border-box;
  margin-top:6px;
}

.btn{
  padding:10px 20px;
  border-radius:12px;
  border:none;
  background: var(--btnBg);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.entry{
  background: var(--entryBg);
  border-radius:10px;
  padding:12px;
  margin-bottom:12px;
}

.meta{font-size:12px;color:var(--entryMeta)}

#snowCanvas{
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}
.front{
  position:relative;
  z-index:2;
  width:100%;
  max-width:720px;
}
</style>
</head>
<body>

<canvas id="snowCanvas"></canvas>

<div class="front">
<h1>Pressure is a privilege.</h1>

<div id="viewPanel" class="panel">
<label>Enter password</label>
<input id="viewPwd" type="password">
<button class="btn" id="viewBtn">Enter</button>
<div id="viewMsg"></div>
</div>

<div id="diaryPanel" class="panel" style="display:none">
<label>Write password</label>
<input id="writePwd" type="password">

<label>Title</label>
<input id="title" type="text">

<label>Content</label>
<textarea id="content"></textarea>

<button class="btn" id="addBtn">Add Entry</button>
<button class="btn" id="refreshBtn">Refresh</button>

<div id="entries"></div>
</div>
</div>

<script>
const API='/api/addEntry';

document.getElementById('viewBtn').onclick=async()=>{
  const pwd=document.getElementById('viewPwd').value.trim();
  const r=await fetch(`${API}?viewPassword=${encodeURIComponent(pwd)}`);
  if(r.status!==200){document.getElementById('viewMsg').innerText='Wrong password';return;}
  const data=await r.json();
  render(data);
  document.getElementById('viewPanel').style.display='none';
  document.getElementById('diaryPanel').style.display='block';
};

document.getElementById('refreshBtn').onclick=()=>{
  document.getElementById('viewBtn').click();
};

document.getElementById('addBtn').onclick=async()=>{
  const title=document.getElementById('title').value.trim();
  const content=document.getElementById('content').value.trim();
  const pwd=document.getElementById('writePwd').value.trim();
  await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pwd,title,content})
  });
  document.getElementById('refreshBtn').click();
};

function render(arr){
  const c=document.getElementById('entries');
  c.innerHTML='';
  arr.reverse().forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';
    div.innerHTML=`<h3>${e.title}</h3><div class="meta">${e.date}</div><p>${e.content}</p>`;
    c.appendChild(div);
  });
}

/* 雪堆积动画 */
const canvas=document.getElementById('snowCanvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
window.onresize=resize;resize();

let flakes=[];
let snowLevel=0;
let melting=false;

for(let i=0;i<120;i++){
  flakes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3+1,s:Math.random()*1+0.5});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 雪地
  ctx.fillStyle='white';
  ctx.fillRect(0,canvas.height-snowLevel,canvas.width,snowLevel);

  flakes.forEach(f=>{
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fill();

    f.y+=f.s;
    if(f.y>canvas.height-snowLevel){
      if(!melting) snowLevel+=0.05;
      f.y=0;
      f.x=Math.random()*canvas.width;
    }
  });

  if(snowLevel>=canvas.height){
    melting=true;
  }
  if(melting){
    snowLevel-=0.3;
    if(snowLevel<=0){
      melting=false;
      snowLevel=0;
    }
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
