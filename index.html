<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olina Diary</title>
  <style>
    body {
      background: #e0f7ff; /* 温柔淡蓝 */
      font-family: 'Pacifico', cursive; /* 手写体 */
      color: #03396c;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; }
    input, textarea, button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #b3e0ff;
      font-family: 'Pacifico', cursive;
    }
    button {
      background: #81d4fa;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }
    button:hover { background: #4fc3f7; }
    #snowflake {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
    .flake {
      position: absolute;
      color: white;
      font-size: 1em;
      user-select: none;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-10px); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Olina Diary</h1>
    <input type="password" id="password" placeholder="Enter password to add entry">
    <input type="text" id="title" placeholder="Title">
    <textarea id="content" rows="5" placeholder="Content"></textarea>
    <button id="addBtn">Add Entry</button>
  </div>

  <div id="snowflake"></div>

  <script>
    // ❄️ 雪花动画
    const snowContainer = document.getElementById('snowflake');
    function createSnow() {
      const flake = document.createElement('div');
      flake.className = 'flake';
      flake.style.left = Math.random() * window.innerWidth + 'px';
      flake.style.fontSize = (10 + Math.random()*20) + 'px';
      flake.textContent = '❄';
      flake.style.animationDuration = (5 + Math.random()*5) + 's';
      snowContainer.appendChild(flake);
      setTimeout(() => flake.remove(), 10000);
    }
    setInterval(createSnow, 200);

    // 🌟 Add Entry
    document.getElementById('addBtn').addEventListener('click', async () => {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const password = document.getElementById('password').value;

      if(!title || !content || !password){
        alert('Please fill all fields');
        return;
      }

      try {
        const res = await fetch('/api/addEntry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, password })
        });
        const data = await res.json();
        alert(data.message);
        if(res.status===200){
          document.getElementById('title').value = '';
          document.getElementById('content').value = '';
          document.getElementById('password').value = '';
        }
      } catch(e){
        alert('Error connecting to server');
      }
    });
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</body>
</html>
