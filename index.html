<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olina Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Great Vibes', cursive;
    background: linear-gradient(to bottom, #e0f7ff, #a0dfff);
    color: #001f3f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin-top: 20px; font-size: 3em; }
  #loginDiv, #diaryDiv { margin-top: 40px; width: 90%; max-width: 600px; }
  input[type=password], input[type=text], textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #99dfff;
    box-sizing: border-box;
    font-family: 'Great Vibes', cursive;
    font-size: 1.2em;
  }
  textarea { resize: none; overflow: hidden; }
  button {
    padding: 12px 25px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #99dfff, #66cfff);
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s ease;
  }
  button:hover { background: linear-gradient(90deg, #66cfff, #33bfff); transform: scale(1.05); }
  .entry { background: rgba(255,255,255,0.7); padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s ease; }
  .entry:hover { transform: translateY(-2px); }
  .date { font-size: 12px; color: #555; margin-bottom: 5px; }
  #snowflake { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
  #writeMsg, #loginMsg { margin-top: 5px; font-size: 14px; }
</style>
</head>
<body>
<h1>Olina Diary</h1>

<div id="loginDiv">
  <h2>Enter password to view diary</h2>
  <input type="password" id="viewPassword" placeholder="Password">
  <button onclick="checkViewPassword()">Enter</button>
  <p id="loginMsg" style="color:red;"></p>
</div>

<div id="diaryDiv" style="display:none;">
  <h2>Diary Entries</h2>
  <div id="entries"></div>

  <h3>Add Entry (requires write password)</h3>
  <input type="password" id="writePassword" placeholder="Write password">
  <input type="text" id="title" placeholder="Title">
  <textarea id="content" placeholder="Your content..." rows="1"></textarea>
  <button onclick="addEntry()">Add Entry</button>
  <p id="writeMsg" style="color:red;"></p>
</div>

<canvas id="snowflake"></canvas>

<script>
const binId = '69a05d5343b1c97be9a098fd';
const accessKey = 'OlinaDiaryKey'; 

// 雪花动画
const canvas = document.getElementById('snowflake');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const flakes = [];
for(let i=0;i<100;i++) flakes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*4+1,d:Math.random()*1});
function drawFlakes(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='white';
  ctx.beginPath();
  for(let f of flakes){
    ctx.moveTo(f.x,f.y);
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
  }
  ctx.fill();
  updateFlakes();
}
function updateFlakes(){
  for(let f of flakes){
    f.y += Math.pow(f.d,2)+1;
    f.x += Math.sin(f.y*0.01)*2;
    if(f.y>canvas.height){f.y=0;f.x=Math.random()*canvas.width;}
  }
  requestAnimationFrame(drawFlakes);
}
drawFlakes();

// textarea 自适应高度
const textarea = document.getElementById('content');
textarea.addEventListener('input', e => {
  e.target.style.height = 'auto';
  e.target.style.height = (e.target.scrollHeight) + 'px';
});

// 密码保护
function checkViewPassword(){
  const pwd = document.getElementById('viewPassword').value;
  if(pwd==='Olina123'){
    document.getElementById('loginDiv').style.display='none';
    document.getElementById('diaryDiv').style.display='block';
    fetchEntries();
  } else {
    document.getElementById('loginMsg').innerText='Wrong password';
  }
}

// 获取日记条目
async function fetchEntries(){
  try{
    const res = await fetch('/api/addEntry', {method:'GET'});
    const data = await res.json();
    displayEntries(data);
  } catch(e){
    console.log('Fetch failed', e);
  }
}

function displayEntries(entries){
  const container = document.getElementById('entries');
  container.innerHTML='';
  entries.forEach(e=>{
    const div = document.createElement('div');
    div.className='entry';
    div.innerHTML=`<h4>${e.title}</h4><div class="date">${e.date}</div><p>${e.content}</p>`;
    container.appendChild(div);
  });
}

// 添加条目
async function addEntry(){
  const password = document.getElementById('writePassword').value;
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;

  if(!title || !content || !password){ document.getElementById('writeMsg').innerText='All fields required'; return; }

  try{
    const res = await fetch('/api/addEntry', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password,title,content})
    });
    const data = await res.json();
    if(res.status===200){
      document.getElementById('writeMsg').innerText='Entry added';
      fetchEntries();
      document.getElementById('title').value='';
      document.getElementById('content').value='';
      document.getElementById('writePassword').value='';
    } else {
      document.getElementById('writeMsg').innerText=data.message;
    }
  } catch(e){
    document.getElementById('writeMsg').innerText='Failed to add entry';
    console.log(e);
  }
}
</script>
</body>
</html>
