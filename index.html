<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olina Diary</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Pacifico', cursive;
      background: linear-gradient(to bottom, #e0f7ff, #cfefff);
      color: #034f84;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      overflow-x: hidden;
    }

    h1 { margin-bottom: 20px; }

    .snowflake {
      position: fixed;
      top: -10px;
      font-size: 1em;
      color: white;
      user-select: none;
      pointer-events: none;
      animation-name: fall;
      animation-duration: 10s;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10px); }
      100% { transform: translateY(110vh); }
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.8);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    input, textarea, button {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #034f84;
      font-family: 'Pacifico', cursive;
      font-size: 1em;
    }

    button {
      background-color: #034f84;
      color: white;
      cursor: pointer;
    }

    .entry {
      margin-bottom: 20px;
      padding: 10px;
      border-bottom: 1px solid #034f84;
    }

    .entry-date {
      font-size: 0.8em;
      color: #555;
    }
  </style>
</head>
<body>

<h1>Olina Diary</h1>

<div class="container" id="login-container">
  <input type="password" id="viewPassword" placeholder="Enter password to view">
  <button onclick="loginView()">View Diary</button>
</div>

<div class="container" id="diary-container" style="display:none;">
  <input type="password" id="writePassword" placeholder="Enter password to add entry">
  <input type="text" id="title" placeholder="Title">
  <textarea id="content" placeholder="Write your diary here..."></textarea>
  <button onclick="addEntry()">Add Entry</button>

  <div id="entries"></div>
</div>

<script>
  const BIN_API = '/api/addEntry.js';

  // 雪花动画
  for(let i=0;i<50;i++){
    const snow = document.createElement('div');
    snow.classList.add('snowflake');
    snow.style.left = Math.random()*100 + 'vw';
    snow.style.fontSize = (Math.random()*10 + 10) + 'px';
    snow.style.animationDuration = (Math.random()*5 + 5) + 's';
    snow.innerHTML = '❄';
    document.body.appendChild(snow);
  }

  async function fetchEntries(){
    const res = await fetch(BIN_API);
    const data = await res.json();
    const container = document.getElementById('entries');
    container.innerHTML = '';
    data.forEach(d => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `<div class="entry-date">${d.date}</div><strong>${d.title}</strong><p>${d.content}</p>`;
      container.appendChild(div);
    });
  }

  function loginView(){
    const pass = document.getElementById('viewPassword').value;
    if(pass === 'Olina123'){
      document.getElementById('login-container').style.display = 'none';
      document.getElementById('diary-container').style.display = 'block';
      fetchEntries();
    } else {
      alert('Wrong password!');
    }
  }

  async function addEntry(){
    const password = document.getElementById('writePassword').value;
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    if(!password || !title || !content) { alert('Fill all fields!'); return; }

    const res = await fetch(BIN_API, {
      method:'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password, title, content})
    });
    const json = await res.json();
    if(res.status === 200){
      alert(json.message);
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      fetchEntries();
    } else {
      alert(json.message);
    }
  }
</script>
</body>
</html>
