<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Olina Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family: 'Pacifico', cursive;
  background: linear-gradient(#e0f7ff, #ffffff);
  overflow-x:hidden;
  color:#03396c;
}
h1 {
  text-align:center;
  margin-top:20px;
  font-size:48px;
}
form {
  max-width:450px;
  margin:20px auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}
input, textarea {
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
  font-family: 'Pacifico', cursive;
}
button {
  padding:12px;
  background:#1e69c0;
  color:white;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  background:#0a4c91;
}
#entries {
  max-width:600px;
  margin:20px auto;
}
.entry {
  border-bottom:1px solid #ccc;
  padding:10px 0;
}
.entry-date {
  font-size:12px;
  color:#555;
}
@keyframes snowFall {
  0% {transform:translateY(-50px);}
  100% {transform:translateY(800px);}
}
.snowflake {
  position:fixed;
  top:-50px;
  font-size:18px;
  color:white;
  animation: snowFall linear infinite;
}
.fire {
  position:fixed;
  bottom:0;
  width:20px;
  height:40px;
  background:linear-gradient(to top, #cce6ff, #66ccff);
  border-radius:50%;
  animation: rise 2s ease-in-out infinite alternate;
}
@keyframes rise {
  0% {transform:translateY(0);}
  100% {transform:translateY(-60px);}
}
</style>
</head>
<body>
<h1>Olina Diary</h1>

<form id="diaryForm">
  <input type="password" id="password" placeholder="Password" required>
  <input type="text" id="title" placeholder="Title" required>
  <textarea id="content" placeholder="Content" rows="4" required></textarea>
  <button type="submit">Add Entry</button>
</form>

<div id="entries"></div>

<!-- 雪花和火焰动画 -->
<script>
for(let i=0;i<30;i++){
  let s=document.createElement('div');
  s.className='snowflake';
  s.style.left=Math.random()*window.innerWidth+'px';
  s.style.fontSize=(10+Math.random()*20)+'px';
  s.style.animationDuration=(5+Math.random()*5)+'s';
  s.innerText='❄';
  document.body.appendChild(s);
}
for(let i=0;i<5;i++){
  let f=document.createElement('div');
  f.className='fire';
  f.style.left=(50+i*100)+'px';
  document.body.appendChild(f);
}
</script>

<script>
const form=document.getElementById('diaryForm');
const entriesDiv=document.getElementById('entries');

async function loadEntries(){
  const res=await fetch('/api/addEntry.js');
  const data=await res.json();
  entriesDiv.innerHTML='';
  data.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';
    div.innerHTML=`<div class="entry-date">${e.date}</div><b>${e.title}</b><p>${e.content}</p>`;
    entriesDiv.appendChild(div);
  });
}
loadEntries();

form.addEventListener('submit',async e=>{
  e.preventDefault();
  const password=document.getElementById('password').value;
  const title=document.getElementById('title').value;
  const content=document.getElementById('content').value;
  const res=await fetch('/api/addEntry.js',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password,title,content})
  });
  const data=await res.json();
  alert(data.message);
  if(data.message==='Entry added'){
    form.reset();
    loadEntries();
  }
});
</script>
</body>
</html>
